<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#4f46e5">
<title>영어 대화 듣기</title>
<style>
  :root{ --bg:#0f172a; --card:#1e293b; --card2:#273449; --line:#334155;
         --txt:#e2e8f0; --sub:#94a3b8; --accent:#6366f1; --accent2:#22c55e; --hi:#fbbf24; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
        background:var(--bg); color:var(--txt); line-height:1.5; }
  header{ padding:16px 16px 10px; position:sticky; top:0; background:linear-gradient(180deg,#0f172a,#0f172aee);
          backdrop-filter:blur(6px); z-index:5; border-bottom:1px solid var(--line); }
  h1{ font-size:19px; margin:0; }
  header .src{ font-size:12px; color:var(--sub); margin-top:3px; }
  .wrap{ max-width:640px; margin:0 auto; padding:0 14px 130px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin-top:14px; }
  label{ font-size:13px; color:var(--sub); display:block; margin-bottom:6px; }
  select, input[type=range]{ width:100%; }
  select{ background:var(--card2); color:var(--txt); border:1px solid var(--line); border-radius:10px;
          padding:11px 12px; font-size:15px; appearance:none; }
  .seg{ display:flex; gap:8px; margin-top:2px; }
  .seg button{ flex:1; background:var(--card2); color:var(--txt); border:1px solid var(--line);
               border-radius:10px; padding:10px 0; font-size:14px; font-weight:600; }
  .seg button.on{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .speedval{ font-weight:700; color:var(--hi); }
  .btnrow{ display:flex; gap:8px; margin-top:12px; }
  .togglebtn{ flex:1; background:var(--card2); border:1px solid var(--line); color:var(--txt); border-radius:10px;
              padding:10px 6px; font-size:13.5px; font-weight:600; text-align:center; text-decoration:none; }
  .togglebtn.on{ background:var(--accent2); border-color:var(--accent2); color:#04240f; }

  #script .ln{ padding:11px 12px; border-radius:12px; margin:8px 0; background:var(--card);
               border:1px solid var(--line); cursor:pointer; transition:.15s; }
  #script .ln.F{ border-left:4px solid #ec4899; }
  #script .ln.M{ border-left:4px solid #38bdf8; }
  #script .ln.active{ background:#3b3416; border-color:var(--hi); }
  .who{ font-size:11px; font-weight:700; letter-spacing:.5px; }
  .ln.F .who{ color:#f472b6; } .ln.M .who{ color:#7dd3fc; }
  .en{ font-size:16px; margin-top:3px; }
  .ko{ font-size:13px; color:var(--sub); margin-top:4px; }
  .ko.hide{ display:none; }
  .tap{ font-size:11px; color:var(--sub); float:right; }

  .bar{ position:fixed; left:0; right:0; bottom:0; background:#111827f2; backdrop-filter:blur(8px);
        border-top:1px solid var(--line); padding:12px 14px calc(12px + env(safe-area-inset-bottom));
        display:flex; justify-content:center; z-index:10; }
  .bar .wrap2{ max-width:640px; width:100%; display:flex; gap:10px; }
  .play{ flex:2; background:var(--accent2); color:#04240f; border:none; border-radius:12px;
         font-size:17px; font-weight:800; padding:15px 0; }
  .play.playing{ background:var(--hi); }
  .stop{ flex:1; background:var(--card2); color:var(--txt); border:1px solid var(--line); border-radius:12px;
         font-size:15px; font-weight:700; }
  .tip{ font-size:12px; color:var(--sub); margin-top:14px; line-height:1.7; }
  .tip b{ color:var(--txt); }
  .warn{ background:#3f2d0b; border:1px solid #a16207; color:#fde68a; font-size:13px; padding:10px 12px;
         border-radius:10px; margin-top:12px; display:none; }
  .loading{ text-align:center; color:var(--sub); padding:30px 0; }
</style>
</head>
<body>
<header>
  <div class="wrap" style="padding-bottom:0">
    <h1>🎧 영어 대화 듣기</h1>
    <div class="src">미국 원어민 신경망 음성(Azure Neural) · 김재우 기본동사100 기반 · 무료</div>
  </div>
</header>

<div class="wrap">

  <div class="card">
    <label>챕터 고르기</label>
    <select id="topic"></select>

    <div style="height:14px"></div>
    <label>대화 길이</label>
    <div class="seg" id="lenSeg">
      <button data-len="short">짧게</button>
      <button data-len="medium" class="on">보통</button>
      <button data-len="full">전체</button>
    </div>

    <div style="height:14px"></div>
    <label>말 속도 : <span class="speedval" id="spdLabel">1.00배</span> <span style="color:var(--sub)">(느리게 ↔ 빠르게)</span></label>
    <input type="range" id="speed" min="0.5" max="1.5" step="0.05" value="1">

    <div class="btnrow">
      <button class="togglebtn on" id="transBtn">번역 : 켬</button>
      <button class="togglebtn" id="repeatBtn">문장 반복 : 끔</button>
      <a class="togglebtn" id="dlBtn" download>mp3 저장</a>
    </div>
  </div>

  <div class="warn" id="warnBox"></div>

  <div id="script"><div class="loading">챕터를 불러오는 중...</div></div>

  <div class="tip">
    💡 문장을 <b>탭</b>하면 그 문장만 들려요. <b>문장 반복</b>을 켜고 탭하면 계속 반복(섀도잉).<br>
    · 속도는 재생 중에도 바로 바뀝니다. 목소리 톤은 유지한 채 빠르기만 변해요.<br>
    · <b>mp3 저장</b>을 누르면 이 챕터 전체 음성이 폰에 저장됩니다 (오프라인용).
  </div>
</div>

<div class="bar">
  <div class="wrap2">
    <button class="play" id="playBtn">▶ 재생</button>
    <button class="stop" id="stopBtn">■ 정지</button>
  </div>
</div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const topicSel=$("topic"), speed=$("speed"), spdLabel=$("spdLabel"), scriptEl=$("script"),
      playBtn=$("playBtn"), stopBtn=$("stopBtn"), transBtn=$("transBtn"),
      repeatBtn=$("repeatBtn"), dlBtn=$("dlBtn"), warnBox=$("warnBox");
const LEN = { short:6, medium:12, full:9999 };

let manifest=[], dlg=null, timings=null;   // timings: 각 문장의 full.mp3 내 [시작,끝] 초
let curLen="medium", showTrans=true, repeatOne=false;
let playing=false, paused=false, mode="all", curIdx=-1, oneIdx=-1;

// 전체 대화가 한 파일이라 문장 사이 로딩 끊김이 없음 — 자연스러운 흐름의 핵심
const player = new Audio();
player.preload = "auto";
try{ player.preservesPitch = true; player.webkitPreservesPitch = true; }catch(e){ console.error("preservesPitch 미지원", e); }

function warn(msg){ warnBox.style.display="block"; warnBox.innerHTML=msg; }

/* ── 데이터 로드 ── */
async function loadManifest(){
  try{
    const r = await fetch("manifest.json", {cache:"no-cache"});
    if(!r.ok) throw new Error(r.status);
    manifest = await r.json();
  }catch(e){
    console.error("manifest 로드 실패", e);
    warn("음성 목록을 불러오지 못했어요. 아직 음성 생성 중일 수 있으니 <b>몇 분 뒤 새로고침</b> 해주세요.");
    scriptEl.innerHTML=""; return;
  }
  topicSel.innerHTML="";
  manifest.forEach((m,i)=>{ const o=document.createElement("option"); o.value=i; o.textContent=m.title; topicSel.appendChild(o); });
  await loadDialogue();
}
async function loadDialogue(){
  stop();
  const m = manifest[+topicSel.value];
  if(!m) return;
  scriptEl.innerHTML='<div class="loading">대본을 불러오는 중...</div>';
  try{
    const [r1, r2] = await Promise.all([
      fetch(`dialogues/${m.id}.json`, {cache:"no-cache"}),
      fetch(`audio/${m.id}/timings.json`, {cache:"no-cache"})
    ]);
    if(!r1.ok) throw new Error("dialogue "+r1.status);
    dlg = await r1.json();
    timings = r2.ok ? await r2.json() : null;   // 없으면(구버전 음성) 문장별 파일 재생으로 대체
  }catch(e){
    console.error("대본 로드 실패", e);
    scriptEl.innerHTML='<div class="loading">대본을 불러오지 못했어요. 새로고침 해주세요.</div>'; return;
  }
  player.src = `audio/${dlg.id}/full.mp3`;
  player.playbackRate = +speed.value;
  dlBtn.href = `audio/${dlg.id}/full.mp3`;
  dlBtn.setAttribute("download", `${dlg.id}.mp3`);
  render();
}

/* ── 렌더 ── */
function curLines(){ return dlg ? dlg.lines.slice(0, LEN[curLen]) : []; }
function render(){
  const lines=curLines();
  scriptEl.innerHTML="";
  lines.forEach((ln,idx)=>{
    const d=document.createElement("div");
    d.className="ln "+ln.s; d.dataset.i=idx;
    d.innerHTML=`<span class="who">${ln.s==="F"?"👩 A":"👨 B"}</span><span class="tap">탭 = 이 문장 ▶</span>
      <div class="en">${ln.en}</div><div class="ko${showTrans?"":" hide"}">${ln.ko}</div>`;
    d.onclick=()=>playOne(idx);
    scriptEl.appendChild(d);
  });
}
function highlight(idx){
  if(idx===curIdx) return;
  curIdx=idx;
  scriptEl.querySelectorAll(".ln").forEach(el=>el.classList.remove("active"));
  if(idx==null || idx<0) return;
  const el=scriptEl.querySelector(`.ln[data-i="${idx}"]`);
  if(el){ el.classList.add("active"); el.scrollIntoView({behavior:"smooth",block:"center"}); }
}

/* ── 연속 재생 엔진 (full.mp3 + 시간표) ── */
function seekPlay(t){
  const go=()=>{ player.currentTime=t; player.playbackRate=+speed.value;
    player.play().catch(e=>{ console.error("재생 실패", e);
      warn("음성 파일이 아직 준비 안 됐을 수 있어요. 몇 분 뒤 새로고침 해주세요."); stop(); }); };
  if(player.readyState>=1) go();
  else player.addEventListener("loadedmetadata", go, {once:true});
}
function cutoffEnd(){ const n=curLines().length; return timings ? timings[n-1].e : Infinity; }
function idxAt(t){
  if(!timings) return -1;
  for(let i=curLines().length-1;i>=0;i--) if(t>=timings[i].s-0.05) return i;
  return 0;
}
player.ontimeupdate = ()=>{
  if(!playing || !timings) return;
  const t=player.currentTime;
  if(mode==="one"){
    if(t>=timings[oneIdx].e-0.02){
      if(repeatOne) player.currentTime=timings[oneIdx].s;
      else stop();
    }
    return;
  }
  if(t>=cutoffEnd()-0.02){ stop(); return; }
  highlight(idxAt(t));
};
player.onended = ()=>{ if(playing){ if(mode==="one"&&repeatOne){ seekPlay(timings?timings[oneIdx].s:0); } else stop(); } };
player.onerror = ()=>{ if(player.src){ console.error("오디오 오류", player.error);
  warn("음성 파일을 불러오지 못했어요. 몇 분 뒤 새로고침 해주세요."); stop(); } };

/* 문장별 파일 재생 (timings 없을 때 예비 경로) */
function playSegFallback(idx){
  player.src=`audio/${dlg.id}/${String(idx).padStart(3,"0")}.mp3`;
  player.onended0 = null;
  highlight(idx);
  player.playbackRate=+speed.value;
  player.play().catch(e=>console.error(e));
  player.onended=()=>{
    if(!playing) return;
    if(mode==="one"){ if(repeatOne){ setTimeout(()=>playing&&playSegFallback(idx),400); } else stop(); return; }
    const next=idx+1;
    if(next>=curLines().length){ stop(); return; }
    setTimeout(()=>playing&&playSegFallback(next),250);
  };
}

function playAll(){
  if(!dlg) return;
  mode="all"; playing=true; paused=false; setPlayUI(true);
  if(timings){ highlight(0); seekPlay(0); }
  else playSegFallback(0);
}
function playOne(idx){
  if(!dlg) return;
  mode="one"; oneIdx=idx; playing=true; paused=false; setPlayUI(true);
  if(timings){ highlight(idx); seekPlay(timings[idx].s); }
  else playSegFallback(idx);
}
function stop(){
  playing=false; paused=false;
  player.pause();
  if(timings && dlg){ /* src 유지 — 다음 재생 즉시 시작 */ }
  setPlayUI(false); highlight(null);
}
function setPlayUI(on){
  playBtn.textContent = on ? "⏸ 일시정지" : "▶ 재생";
  playBtn.classList.toggle("playing", on);
}
playBtn.onclick=()=>{
  if(playing){ player.pause(); playing=false; paused=true; setPlayUI(false); playBtn.textContent="▶ 이어재생"; }
  else if(paused){ playing=true; paused=false; setPlayUI(true); player.play().catch(e=>console.error(e)); }
  else playAll();
};
stopBtn.onclick=stop;

/* ── 옵션들 ── */
speed.oninput=()=>{ spdLabel.textContent=(+speed.value).toFixed(2)+"배"; player.playbackRate=+speed.value; };
transBtn.onclick=()=>{ showTrans=!showTrans;
  transBtn.textContent="번역 : "+(showTrans?"켬":"끔"); transBtn.classList.toggle("on",showTrans);
  scriptEl.querySelectorAll(".ko").forEach(k=>k.classList.toggle("hide",!showTrans)); };
repeatBtn.onclick=()=>{ repeatOne=!repeatOne;
  repeatBtn.textContent="문장 반복 : "+(repeatOne?"켬":"끔"); repeatBtn.classList.toggle("on",repeatOne); };
$("lenSeg").querySelectorAll("button").forEach(b=>{
  b.onclick=()=>{ $("lenSeg").querySelectorAll("button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); curLen=b.dataset.len; stop(); render(); };
});
topicSel.onchange=loadDialogue;

loadManifest();
</script>
</body>
</html>
