<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>기본동사 리스닝</title>
<style>
  :root{
    --bg:#0b1120; --bg2:#0f172a; --card:#1a2438; --card2:#232f47; --line:#2c3a55;
    --txt:#e8eefc; --sub:#93a3bf; --dim:#5b6b8a;
    --accent:#6d8bff; --accent2:#22c55e; --hi:#ffd24a;
    --have:#22b8cf; --make:#f472b6; --get:#a78bfa; --take:#fb923c;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
        background:radial-gradient(120% 90% at 50% 0%, #16203a 0%, var(--bg) 60%); color:var(--txt);
        line-height:1.5; -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:680px; margin:0 auto; }

  /* ── 공통 헤더 ── */
  header{ position:sticky; top:0; z-index:20; backdrop-filter:blur(10px);
          background:linear-gradient(180deg, rgba(11,17,32,.96), rgba(11,17,32,.7));
          border-bottom:1px solid var(--line); }
  .hbar{ display:flex; align-items:center; gap:12px; padding:14px 16px; max-width:680px; margin:0 auto; }
  .back{ width:36px; height:36px; flex:none; border-radius:11px; border:1px solid var(--line);
         background:var(--card); color:var(--txt); font-size:18px; display:none; align-items:center; justify-content:center; }
  .htitle{ font-size:17px; font-weight:800; letter-spacing:-.2px; }
  .hsub{ font-size:11.5px; color:var(--sub); margin-top:1px; }

  /* ── 홈: 챕터 그리드 ── */
  .home-hero{ padding:26px 18px 6px; }
  .home-hero h1{ font-size:25px; margin:0 0 4px; letter-spacing:-.5px; }
  .home-hero p{ margin:0; color:var(--sub); font-size:13.5px; }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:16px; }
  .verb{ position:relative; border-radius:18px; padding:18px 16px 16px; min-height:118px;
         background:var(--card); border:1px solid var(--line); overflow:hidden; cursor:pointer;
         transition:transform .12s, border-color .12s; display:flex; flex-direction:column; justify-content:space-between; }
  .verb:active{ transform:scale(.97); }
  .verb .word{ font-size:30px; font-weight:800; letter-spacing:-.5px; line-height:1; }
  .verb .ko{ font-size:12.5px; color:var(--sub); margin-top:7px; }
  .verb .meta{ font-size:11px; color:var(--dim); margin-top:10px; display:flex; gap:8px; align-items:center; }
  .verb .glow{ position:absolute; right:-30px; top:-30px; width:110px; height:110px; border-radius:50%;
               filter:blur(30px); opacity:.5; }
  .verb.locked{ opacity:.5; cursor:default; }
  .verb.locked:active{ transform:none; }
  .badge{ font-size:10px; font-weight:700; padding:3px 8px; border-radius:999px; border:1px solid var(--line);
          color:var(--sub); background:#0e1830; }
  .badge.ready{ color:#062015; background:var(--accent2); border-color:var(--accent2); }

  /* ── 플레이어 화면 ── */
  #player{ display:none; }
  .tabs{ display:flex; gap:8px; padding:12px 16px 4px; max-width:680px; margin:0 auto; }
  .tab{ flex:1; text-align:center; padding:10px 0; border-radius:12px; font-size:14px; font-weight:700;
        background:var(--card); border:1px solid var(--line); color:var(--sub); }
  .tab.on{ background:var(--accent); border-color:var(--accent); color:#fff; }

  /* 가사(스크립트) */
  #lyrics{ padding:8px 12px 190px; max-width:680px; margin:0 auto; }
  .lyric{ padding:14px 14px; border-radius:16px; margin:6px 0; cursor:pointer;
          transition:background .2s, opacity .25s, transform .2s; opacity:.42; }
  .lyric .who{ font-size:10.5px; font-weight:800; letter-spacing:.6px; text-transform:uppercase; }
  .lyric.F .who{ color:#f9a8d4; } .lyric.M .who{ color:#93c5fd; }
  .lyric .en{ font-size:19px; font-weight:650; letter-spacing:-.2px; margin-top:3px; line-height:1.32; }
  .lyric .ko{ font-size:13.5px; color:var(--sub); margin-top:5px; }
  .lyric .ko.hide{ display:none; }
  .lyric.active{ opacity:1; background:linear-gradient(100deg, rgba(109,139,255,.16), rgba(109,139,255,.04));
                 transform:scale(1.015); }
  .lyric.active .en{ color:#fff; }
  .lyric.active.F{ box-shadow:inset 3px 0 0 #ec4899; }
  .lyric.active.M{ box-shadow:inset 3px 0 0 #38bdf8; }
  .lyric.done{ opacity:.30; }

  /* 원문 이미지 */
  #reading{ display:none; padding:10px 10px 60px; max-width:680px; margin:0 auto; }
  #reading .note{ font-size:12px; color:var(--sub); text-align:center; padding:6px 10px 12px; }
  #reading img{ width:100%; height:auto; display:block; border-radius:12px; margin:10px 0;
                background:#fff; border:1px solid var(--line); }
  .pageno{ text-align:center; font-size:11px; color:var(--dim); margin-top:-4px; }

  /* 하단 컨트롤바 */
  .dock{ position:fixed; left:0; right:0; bottom:0; z-index:30; padding:10px 14px calc(10px + env(safe-area-inset-bottom));
         background:linear-gradient(180deg, rgba(11,17,32,.4), rgba(11,17,32,.97) 30%); backdrop-filter:blur(10px);
         border-top:1px solid var(--line); display:none; }
  .dock .wrap{ display:flex; flex-direction:column; gap:9px; }
  .opts{ display:flex; gap:7px; }
  .chip{ flex:1; background:var(--card); border:1px solid var(--line); color:var(--txt); border-radius:10px;
         padding:8px 4px; font-size:12.5px; font-weight:600; text-align:center; text-decoration:none; white-space:nowrap; }
  .chip.on{ background:var(--accent2); border-color:var(--accent2); color:#062015; }
  .speedwrap{ display:flex; align-items:center; gap:10px; font-size:12px; color:var(--sub); }
  .speedwrap input{ flex:1; }
  .speedval{ color:var(--hi); font-weight:800; min-width:44px; text-align:right; font-variant-numeric:tabular-nums; }
  .transport{ display:flex; gap:10px; }
  .play{ flex:2; background:var(--accent2); color:#052012; border:none; border-radius:13px;
         font-size:16px; font-weight:800; padding:14px 0; }
  .play.on{ background:var(--hi); color:#3a2c00; }
  .stop{ flex:1; background:var(--card2); color:var(--txt); border:1px solid var(--line); border-radius:13px;
         font-size:14px; font-weight:700; }
  .hint{ text-align:center; color:var(--dim); font-size:11px; padding-top:2px; }
</style>
</head>
<body>

<header>
  <div class="hbar">
    <button class="back" id="back">‹</button>
    <div>
      <div class="htitle" id="htitle">🎧 기본동사 리스닝</div>
      <div class="hsub" id="hsub">김재우 기본동사100 · 원어민 신경망 음성</div>
    </div>
  </div>
</header>

<!-- 홈 -->
<main id="home" class="wrap">
  <div class="home-hero">
    <h1>어떤 동사부터?</h1>
    <p>동사 하나를 골라 대화를 들어보세요. 유튜브 가사처럼 지금 나오는 문장이 강조됩니다.</p>
  </div>
  <div class="grid" id="grid"></div>
</main>

<!-- 플레이어 -->
<main id="player">
  <div class="tabs">
    <div class="tab on" id="tabListen" data-t="listen">듣기</div>
    <div class="tab" id="tabRead" data-t="read">원문</div>
  </div>
  <div id="lyrics" class="wrap"></div>
  <div id="reading" class="wrap"></div>
</main>

<!-- 하단 재생바 -->
<div class="dock" id="dock">
  <div class="wrap">
    <div class="speedwrap">
      <span>속도</span>
      <input type="range" id="speed" min="0.5" max="1.5" step="0.05" value="1">
      <span class="speedval" id="spdLabel">1.00×</span>
    </div>
    <div class="opts">
      <button class="chip on" id="transBtn">번역 켬</button>
      <button class="chip" id="repeatBtn">한문장 반복</button>
      <a class="chip" id="dlBtn" download>mp3 저장</a>
    </div>
    <div class="transport">
      <button class="play" id="playBtn">▶ 재생</button>
      <button class="stop" id="stopBtn">■ 정지</button>
    </div>
    <div class="hint">문장을 탭하면 그 부분부터 재생돼요</div>
  </div>
</div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const VERBS = [
  { verb:"have", ko:"있다·먹다·겪다·열다", color:"var(--have)" },
  { verb:"make", ko:"해주다·되게하다·시키다", color:"var(--make)" },
  { verb:"get",  ko:"얻다·되다·이해하다",   color:"var(--get)" },
  { verb:"take", ko:"가져가다·타다·걸리다",  color:"var(--take)" },
];
let manifest=[], byVerb={}, dlg=null, timings=null, chapter=null;
let showTrans=true, repeatOne=false, playing=false, paused=false, mode="all", curIdx=-1, oneIdx=-1;

const player = new Audio(); player.preload="auto";
try{ player.preservesPitch=true; player.webkitPreservesPitch=true; }catch(e){ console.error("preservesPitch 미지원",e); }

/* ── 홈 그리드 ── */
async function boot(){
  try{
    const r = await fetch("manifest.json",{cache:"no-cache"});
    manifest = r.ok ? await r.json() : [];
  }catch(e){ console.error("manifest 실패",e); manifest=[]; }
  byVerb={}; manifest.forEach(m=>byVerb[m.verb]=m);
  const grid=$("grid"); grid.innerHTML="";
  VERBS.forEach(v=>{
    const m = byVerb[v.verb];
    const ready = !!m;
    const el=document.createElement("div");
    el.className="verb"+(ready?"":" locked");
    el.innerHTML=`<div class="glow" style="background:${v.color}"></div>
      <div><div class="word" style="color:${v.color}">${v.verb}</div><div class="ko">${v.ko}</div></div>
      <div class="meta">${ ready
        ? `<span class="badge ready">듣기</span>${m.pages?'<span class="badge">원문</span>':''}<span>${m.lines}문장</span>`
        : `<span class="badge">준비 중</span>` }</div>`;
    if(ready) el.onclick=()=>openChapter(v.verb);
    grid.appendChild(el);
  });
}

/* ── 챕터 열기 ── */
async function openChapter(verb){
  chapter = byVerb[verb];
  try{
    const [r1,r2]=await Promise.all([
      fetch(`dialogues/${verb}.json`,{cache:"no-cache"}),
      fetch(`audio/${verb}/timings.json`,{cache:"no-cache"})
    ]);
    dlg = await r1.json();
    timings = r2.ok ? await r2.json() : null;
  }catch(e){ console.error("챕터 로드 실패",e); alert("아직 음성이 생성 중일 수 있어요. 잠시 후 새로고침 해주세요."); return; }
  player.src=`audio/${verb}/full.mp3`; player.playbackRate=+$("speed").value;
  $("dlBtn").href=`audio/${verb}/full.mp3`; $("dlBtn").setAttribute("download",`${verb}.mp3`);

  $("htitle").textContent = verb;
  $("hsub").textContent = dlg.title;
  $("back").style.display="flex";
  $("home").style.display="none";
  $("player").style.display="block";
  $("dock").style.display="block";
  $("tabRead").style.display = (chapter.pages>0)?"block":"none";
  switchTab("listen");
  renderLyrics(); renderReading();
  window.scrollTo(0,0);
}
function goHome(){
  stop(); $("player").style.display="none"; $("dock").style.display="none";
  $("home").style.display="block"; $("back").style.display="none";
  $("htitle").textContent="🎧 기본동사 리스닝"; $("hsub").textContent="김재우 기본동사100 · 원어민 신경망 음성";
  window.scrollTo(0,0);
}
$("back").onclick=goHome;

/* ── 탭 ── */
function switchTab(t){
  $("tabListen").classList.toggle("on",t==="listen");
  $("tabRead").classList.toggle("on",t==="read");
  $("lyrics").style.display = t==="listen"?"block":"none";
  $("reading").style.display = t==="read"?"block":"none";
  $("dock").style.display = t==="listen"?"block":"none";
}
$("tabListen").onclick=()=>switchTab("listen");
$("tabRead").onclick=()=>switchTab("read");

/* ── 가사 렌더 ── */
function renderLyrics(){
  const box=$("lyrics"); box.innerHTML="";
  dlg.lines.forEach((ln,i)=>{
    const d=document.createElement("div");
    d.className="lyric "+ln.s; d.dataset.i=i;
    d.innerHTML=`<div class="who">${ln.s==="F"?"👩 A":"👨 B"}</div>
      <div class="en">${ln.en}</div><div class="ko${showTrans?"":" hide"}">${ln.ko}</div>`;
    d.onclick=()=>playFrom(i);
    box.appendChild(d);
  });
  curIdx=-1;
}
function renderReading(){
  const box=$("reading"); box.innerHTML="";
  if(!chapter.pages){ box.innerHTML='<div class="note">이 챕터는 원문 페이지가 없어요.</div>'; return; }
  box.innerHTML='<div class="note">📖 김재우 기본동사100 원문 · 개인 학습용 · 두 손가락으로 확대하세요</div>';
  for(let i=1;i<=chapter.pages;i++){
    const img=document.createElement("img");
    img.loading="lazy"; img.src=`pages/${chapter.verb}/${String(i).padStart(2,"0")}.jpg`;
    img.alt=`${chapter.verb} 원문 ${i}`;
    box.appendChild(img);
  }
}

/* ── 싱크 하이라이트 ── */
function setActive(i){
  if(i===curIdx) return;
  const box=$("lyrics");
  const prev=box.querySelector(".lyric.active"); if(prev){ prev.classList.remove("active"); prev.classList.add("done"); }
  curIdx=i;
  if(i<0) return;
  const el=box.querySelector(`.lyric[data-i="${i}"]`);
  if(el){ el.classList.remove("done"); el.classList.add("active");
    el.scrollIntoView({behavior:"smooth", block:"center"}); }
}
function idxAt(t){ if(!timings) return -1;
  for(let i=timings.length-1;i>=0;i--) if(t>=timings[i].s-0.05) return i; return 0; }

player.ontimeupdate=()=>{
  if(!playing||!timings) return;
  const t=player.currentTime;
  if(mode==="one"){
    if(t>=timings[oneIdx].e-0.02){ if(repeatOne){ player.currentTime=timings[oneIdx].s; } else stop(); }
    return;
  }
  setActive(idxAt(t));
};
player.onended=()=>{ if(mode==="one"&&repeatOne&&playing){ player.currentTime=timings?timings[oneIdx].s:0; player.play(); } else stop(); };
player.onerror=()=>{ if(player.src){ console.error("audio err",player.error); } };

/* ── 재생 제어 ── */
function seek(t){ const go=()=>{ player.currentTime=t; player.playbackRate=+$("speed").value;
    player.play().catch(e=>console.error("play 실패",e)); };
  if(player.readyState>=1) go(); else player.addEventListener("loadedmetadata",go,{once:true}); }
function playAll(){ mode="all"; playing=true; paused=false; ui(true); if(timings) setActive(0); seek(timings?timings[0].s:0); }
function playFrom(i){ mode="all"; playing=true; paused=false; ui(true); setActive(i); seek(timings?timings[i].s:0); }
function playOneRepeat(i){ mode="one"; oneIdx=i; playing=true; paused=false; ui(true); setActive(i); seek(timings[i].s); }
function stop(){ playing=false; paused=false; player.pause(); ui(false);
  const a=$("lyrics").querySelector(".lyric.active"); if(a) a.classList.remove("active"); curIdx=-1; }
function ui(on){ $("playBtn").textContent = on?"⏸ 일시정지":"▶ 재생"; $("playBtn").classList.toggle("on",on); }

$("playBtn").onclick=()=>{
  if(playing){ player.pause(); playing=false; paused=true; ui(false); $("playBtn").textContent="▶ 이어재생"; }
  else if(paused){ playing=true; paused=false; ui(true); player.play().catch(e=>console.error(e)); }
  else playAll();
};
$("stopBtn").onclick=stop;

/* 문장 탭: 한문장 반복이 켜져 있으면 그 문장만 반복, 아니면 그 지점부터 이어재생 */
function playFromTap(i){ if(repeatOne) playOneRepeat(i); else playFrom(i); }
// renderLyrics에서 onclick=playFrom(i) 였는데 반복모드 반영 위해 교체
function bindLyricTaps(){ $("lyrics").querySelectorAll(".lyric").forEach(el=>{
  el.onclick=()=>playFromTap(+el.dataset.i); }); }

/* ── 옵션 ── */
$("speed").oninput=()=>{ $("spdLabel").textContent=(+$("speed").value).toFixed(2)+"×"; player.playbackRate=+$("speed").value; };
$("transBtn").onclick=()=>{ showTrans=!showTrans; $("transBtn").textContent="번역 "+(showTrans?"켬":"끔");
  $("transBtn").classList.toggle("on",showTrans);
  $("lyrics").querySelectorAll(".ko").forEach(k=>k.classList.toggle("hide",!showTrans)); };
$("repeatBtn").onclick=()=>{ repeatOne=!repeatOne; $("repeatBtn").textContent="한문장 반복"+(repeatOne?" ●":"");
  $("repeatBtn").classList.toggle("on",repeatOne);
  if(!repeatOne && mode==="one") mode="all"; };

// 최초 렌더 후 탭 바인딩 재적용
const _rl=renderLyrics; renderLyrics=function(){ _rl(); bindLyricTaps(); };

boot();
</script>
</body>
</html>
